<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-8 text-indigo-600">🛍️ Product Review Portal</h1>
    <div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
  </div>

  <script>
    fetch('/api/products')
      .then(r => r.json())
      .then(products => {
        const container = document.getElementById('products');
        products.forEach(p => {
          container.innerHTML += `
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
              <img src="${p.image}" class="w-full h-48 object-cover">
              <div class="p-4">
                <h3 class="font-semibold text-lg">${p.name}</h3>
                <a href="products.html?id=${p.id}" 
                   class="mt-4 block text-center bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">
                  View Reviews & Add Review
                </a>
              </div>
            </div>`;
        });
      });
  </script>
</body>
</html>
